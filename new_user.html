{% extends "base.html" %}
{% block title %}New User — FarmTracker{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('users_list') }}">Users</a> / New{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm" style="border-radius:10px;">
      <div class="card-body p-4">
        <h5 class="fw-semibold mb-4">Create New User</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
              <option value="worker">Worker</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn text-white" style="background:#3B6D11;">Create User</button>
            <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
